worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    upstream core_api {
        server core-api:5000;
    }

    upstream ml_service {
        server ml-service:5001;
    }

    upstream gen_ai_service {
        server gen-ai-service:5002;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 10m;

        # Health endpoint (no rate limit)
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # Auth endpoints — strict rate limit
        location ~ ^/api/auth/(login|register) {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://core_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Core API
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://core_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_read_timeout 30s;
        }

        # Socket.IO — needs upgrade headers
        location /socket.io/ {
            proxy_pass http://core_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 3600s;
        }

        # ML service
        location /ml/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://ml_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }

        # Gen-AI service
        location /ai/ {
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://gen_ai_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
            # SSE support
            proxy_buffering off;
            proxy_cache off;
        }

        # SPA fallback — serve index.html for client-side routing
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # Metrics (restrict to internal)
        location /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            deny all;
            proxy_pass http://core_api;
        }
    }
}
