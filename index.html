<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="FinSocial — Community-driven simulated brokerage platform. Retail investing meets social community and AI-powered market analysis." />
  <title>FinSocial — Community Brokerage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Auth Page (shown first) -->
  <div id="authRoot"></div>

  <div class="app" id="app" style="display:none">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="logo">
          <svg viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="6" fill="#111"/><path d="M7 20V12l5-4v12M16 20V8l5-4v16" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
          <span>FinSocial</span>
        </div>
        <div class="sidebar-top-actions">
          <!-- Notification Bell -->
          <button class="notif-bell" id="notifBell" aria-label="Notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="notif-badge" id="notifBadge">5</span>
          </button>
        </div>
      </div>
      <nav class="nav">
        <a href="#home" class="nav-item active" data-page="home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span>Home</span>
        </a>
        <a href="#tribe" class="nav-item" data-page="tribe">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>Tribe Rooms</span>
        </a>
        <a href="#forum" class="nav-item" data-page="forum">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>Q&A Forum</span>
        </a>
        <a href="#portfolio" class="nav-item" data-page="portfolio">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          <span>Portfolio</span>
        </a>
        <a href="#stocks" class="nav-item" data-page="stocks">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <span>Stocks</span>
        </a>
      </nav>
      <div class="sidebar-profile" id="sidebarProfile">
        <div class="profile-av">AK</div>
        <div class="profile-meta">
          <strong>Ashmit K. <span class="verified-badge" title="Verified Trader">✓</span></strong>
          <span>Verified Trader</span>
        </div>
        <button class="logout-btn" id="logoutBtn" title="Sign out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </aside>

    <!-- Notification Panel -->
    <div class="notif-panel" id="notifPanel">
      <div class="notif-panel-header">
        <strong>Notifications</strong>
        <button class="notif-clear" id="notifClear">Mark all read</button>
      </div>
      <div class="notif-list" id="notifList"></div>
    </div>

    <!-- Mobile Header -->
    <header class="mobile-header" id="mobileHeader">
      <button class="mob-menu-btn" id="mobMenuBtn" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="logo">
        <svg viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="6" fill="#111"/><path d="M7 20V12l5-4v12M16 20V8l5-4v16" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
        <span>FinSocial</span>
      </div>
      <button class="notif-bell" id="mobNotifBell" aria-label="Notifications">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notif-badge">5</span>
      </button>
    </header>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Pages Container -->
    <main class="main" id="main"></main>
  </div>

  <script src="pages/auth.js"></script>
  <script src="pages/home.js"></script>
  <script src="pages/tribe.js"></script>
  <script src="pages/forum.js"></script>
  <script src="pages/portfolio.js"></script>
  <script src="pages/stocks.js"></script>
  <script src="app.js"></script>
</body>
</html>
